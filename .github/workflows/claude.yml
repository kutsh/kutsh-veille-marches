name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Le Bash est desactive par defaut. On autorise uniquement la creation de PR
          # pour que Claude ouvre lui-meme la pull request au lieu de se contenter
          # d'un lien pre-rempli (comportement par defaut de l'action).
          claude_args: |
            --allowedTools "Bash(gh pr create:*),Bash(gh pr view:*),Bash(gh pr list:*)"
            --append-system-prompt "Quand tu as pousse des commits sur une nouvelle branche pour repondre a une issue, ouvre toi-meme la pull request avec la commande gh pr create, en ciblant la branche par defaut du depot. Ne te contente pas de fournir un lien de creation pre-rempli. Dans le corps de la PR, ajoute une ligne Closes #N referencant l'issue d'origine. Si une PR existe deja pour cette branche, ne la recree pas."
